<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버시리즈 계정 관리자</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>네이버시리즈 계정 관리자</h1>
        <p>PC 전용 · 테이블 중심 관리 · 로컬 저장</p>
      </div>
      <div class="topbar-actions">
        <button id="addAccountBtn" class="btn btn-primary">계정 추가</button>
        <button id="backupBtn" class="btn">JSON 백업</button>
        <button id="restoreBtn" class="btn">JSON 불러오기</button>
        <button id="resetBtn" class="btn btn-danger">전체 초기화</button>
        <input id="restoreInput" type="file" accept="application/json" hidden />
      </div>
    </header>

    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">계정 수</div>
        <div id="summaryAccounts" class="summary-value">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">총 보유 쿠키</div>
        <div id="summaryCookies" class="summary-value">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">오늘~모레 만료 합</div>
        <div id="summaryExpireSoon" class="summary-value">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">작품 수</div>
        <div id="summaryWorks" class="summary-value">0</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>계정 관리</h2>
          <p>행 단위 직접 입력 · 상세 구매 목록은 펼침</p>
        </div>
      </div>

      <div class="table-scroll">
        <table class="data-table account-table">
          <thead>
            <tr>
              <th class="w-40">계정명</th>
              <th class="w-48">아이디/이메일</th>
              <th class="w-12">총보유</th>
              <th class="w-12">오늘만료</th>
              <th class="w-12">내일만료</th>
              <th class="w-12">모레만료</th>
              <th class="w-12">만료합</th>
              <th class="w-12">오늘구매</th>
              <th class="w-14">구매후잔량</th>
              <th>비고</th>
              <th class="w-18">상세/삭제</th>
            </tr>
          </thead>
          <tbody id="accountTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header works-header">
        <div>
          <h2>작품 리스트</h2>
          <p>추가/수정/삭제 · 작품명 자동완성 소스</p>
        </div>
        <div class="inline-tools">
          <input id="workSearchInput" class="search-input" type="text" placeholder="작품 검색" />
          <button id="sortTitleBtn" class="btn btn-small">작품명 정렬</button>
          <button id="sortPriceBtn" class="btn btn-small">가격 정렬</button>
        </div>
      </div>

      <form id="workForm" class="work-form">
        <input type="hidden" id="workId" />
        <div class="form-cell title">
          <label for="workTitle">작품명</label>
          <input id="workTitle" type="text" required />
        </div>
        <div class="form-cell price">
          <label for="workPrice">쿠키가격</label>
          <input id="workPrice" type="number" min="0" step="1" value="0" required />
        </div>
        <div class="form-cell discount-check">
          <label for="workDiscount">할인</label>
          <input id="workDiscount" type="checkbox" />
        </div>
        <div class="form-cell date">
          <label for="workDiscountEnd">할인종료일</label>
          <input id="workDiscountEnd" type="date" />
        </div>
        <div class="form-cell note">
          <label for="workNote">비고</label>
          <input id="workNote" type="text" />
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">저장</button>
          <button id="cancelWorkEditBtn" class="btn" type="button">취소</button>
        </div>
      </form>

      <div class="table-scroll works-scroll">
        <table class="data-table work-table">
          <thead>
            <tr>
              <th class="w-40">작품명</th>
              <th class="w-12">가격</th>
              <th class="w-10">할인</th>
              <th class="w-20">할인종료일</th>
              <th>비고</th>
              <th class="w-18">수정/삭제</th>
            </tr>
          </thead>
          <tbody id="workTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <template id="purchaseRowTemplate">
    <tr class="purchase-row">
      <td>
        <input class="purchase-title-input" type="text" list="workListData" placeholder="작품명 검색 또는 입력" />
      </td>
      <td>
        <input class="purchase-cost-input" type="number" min="0" step="1" value="0" />
      </td>
      <td class="purchase-actions-cell">
        <button type="button" class="btn btn-small btn-delete-purchase">삭제</button>
      </td>
    </tr>
  </template>

  <datalist id="workListData"></datalist>

  <script src="app.js"></script>
</body>
</html>
